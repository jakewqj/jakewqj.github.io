<!-- AI-readable structured data — WebSite + Person schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "@id": "{{ site.url }}/#website",
      "url": "{{ site.url }}/",
      "name": "{{ site.title }}",
      "description": "{{ site.description | strip_newlines }}",
      "inLanguage": "{{ site.lang | default: 'en' }}",
      "author": { "@id": "{{ site.url }}/#author" },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "{{ site.url }}/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    },
    {
      "@type": "Person",
      "@id": "{{ site.url }}/#author",
      "name": "{{ site.social.name }}",
      "url": "{{ site.url }}/about/",
      "email": "{{ site.social.email }}",
      "sameAs": [
        {% for link in site.social.links %}
        "{{ link }}"{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ],
      "jobTitle": "PR Manager",
      "worksFor": {
        "@type": "Organization",
        "name": "Donner Music"
      }
    }
    {% if page.layout == 'post' %}
    ,{
      "@type": "BlogPosting",
      "@id": "{{ page.url | absolute_url }}#article",
      "url": "{{ page.url | absolute_url }}",
      "headline": "{{ page.title | escape }}",
      "datePublished": "{{ page.date | date_to_xmlschema }}",
      "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
      "author": { "@id": "{{ site.url }}/#author" },
      "isPartOf": { "@id": "{{ site.url }}/#website" },
      "inLanguage": "{{ site.lang | default: 'en' }}"
      {% if page.categories.size > 0 %}
      ,"articleSection": "{{ page.categories | join: ', ' }}"
      {% endif %}
      {% if page.tags.size > 0 %}
      ,"keywords": "{{ page.tags | join: ', ' }}"
      {% endif %}
      {% if page.description %}
      ,"description": "{{ page.description | escape }}"
      {% elsif page.excerpt %}
      ,"description": "{{ page.excerpt | strip_html | truncate: 200 | escape }}"
      {% endif %}
    }
    {% endif %}
  ]
}
</script>

<!-- AI crawler hints -->
<meta name="ai-content-type" content="blog">
<meta name="ai-author" content="{{ site.social.name }}">
<meta name="ai-topics" content="music industry, Chinese indie music, album reviews, music gear, live shows">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }} — Atom Feed" href="{{ '/feed.xml' | absolute_url }}">
